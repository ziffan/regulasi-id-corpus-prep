# SPDX-License-Identifier: Apache-2.0
# Profile: ri-uu — Undang-Undang Republik Indonesia
# Covers sumber PDF peraturan.go.id

metadata:
  name: ri-uu
  description: "UU (Undang-Undang) RI — sumber PDF peraturan.go.id"
  version: "1.0.0"
  document_types:
    - UU

rules:
  # =========================================================
  # NOISE REMOVAL — dijalankan SEBELUM whitespace_normalize
  # =========================================================

  # Hapus baris banner peraturan.go.id (selalu di baris pertama)
  - name: remove_menemukan_kesalahan
    type: noise_removal
    pattern: 'Menemukan kesalahan ketik[^\n]*'
    replacement: ''
    flags: [IGNORECASE]

  # Hapus penanda dokumen SK di tiap halaman
  # (?:[ \t]+[A-Z])? pakai [ \t] bukan \s agar tidak konsumsi newline
  - name: remove_sk_markers
    type: noise_removal
    pattern: 'SK\s+No\.?\s*[\w&,\.]+(?:[ \t]+[A-Z])?'
    replacement: ''

  # Hapus simbol bintang dekoratif (peraturan.go.id SALINAN: "SALINAN    ★")
  - name: remove_star_artifacts
    type: noise_removal
    pattern: '[0-9A]?\s*★\s*[;:\s]?'
    replacement: ''

  # Hapus header SALINAN beserta dekorasi trailing di baris yang sama
  - name: remove_salinan
    type: noise_removal
    pattern: 'SALINAN[^\n]*'
    replacement: ''

  # Hapus baris kop surat "PRESIDEN" yang berdiri sendiri
  - name: remove_page_header_presiden_line
    type: noise_removal
    pattern: '^\s*(?:PRESIDEN|FNESIDEN|FRESIDEN)\s*$'
    replacement: ''
    flags: [MULTILINE]

  # Hapus baris kop surat "REPUBLIK INDONESIA" atau semua varian garbled yang diawali R
  # R[A-Z,\.]{3,10} cover: REPUEUK, REPUELIK, REPTJBLIK, REPTIBLIK, REFUBUK, NEPUBLIK, REPUBUK
  - name: remove_page_header_indonesia_line
    type: noise_removal
    pattern: '^\s*R[A-Z,\.]{3,10}\s+[A-Z]{4,}\s*$'
    replacement: ''
    flags: [MULTILINE]

  # Hapus varian kop garbled "... INDONESIA" yang tidak diawali R
  # Cover: "K INDONESIA", "UK INDONESIA", "BUK INDONESIA", "INDONESIA" berdiri sendiri
  - name: remove_page_header_indonesia_truncated
    type: noise_removal
    pattern: '^\s*(?:[A-Z]{1,6}\s+)?INDONESIA\s*$'
    replacement: ''
    flags: [MULTILINE]

  # Hapus nomor halaman format utama: -N- termasuk spasi dan OCR (t/l sebagai 1)
  # Cover: "-3-", "- 11-", "-t2-", "-t4-"
  - name: remove_page_numbers
    type: noise_removal
    pattern: '\s*-\s*[lt\d]+\s*-\s*'
    replacement: ' '

  # Hapus nomor halaman hanya dengan tanda hubung di depan: -N (tanpa trailing dash)
  - name: remove_page_numbers_leading_only
    type: noise_removal
    pattern: '^\s*-\s*[lt\d]+\s*$'
    replacement: ''
    flags: [MULTILINE]

  # Hapus nomor halaman hanya dengan tanda hubung di belakang: N- (tanpa leading dash)
  - name: remove_page_numbers_trailing_only
    type: noise_removal
    pattern: '^\s*[lt\d]+\s*-\s*$'
    replacement: ''
    flags: [MULTILINE]

  # Hapus continuation marker akhir halaman: "..." atau ". . ."
  # Gunakan [ \t]* bukan \s* agar tidak ikut konsumsi newline
  - name: remove_continuation_markers
    type: noise_removal
    pattern: '[ \t]*\.[ \t]*\.[ \t]*\.[ \t]*$'
    replacement: ''
    flags: [MULTILINE]

  # Hapus seluruh section LAMPIRAN beserta isinya (policy: lihat README)
  - name: remove_lampiran
    type: noise_removal
    pattern: '\n\s*LAMPIRAN(?:\s+[IVX]+)?\s*\n[\s\S]*'
    replacement: ''

  # Hapus notice publikasi "LEMBARAN NEGARA" / "TAMBAHAN LEMBARAN NEGARA" (ALL CAPS)
  # INDONESI[^\n]* cover varian garbled: "INDONESIATAHUN", "INDONESI.A", dll.
  - name: remove_lembaran_negara
    type: noise_removal
    pattern: '(?:TAMBAHAN\s+)?LEMBARAN\s+NEGARA\s+REPUBLIK\s+INDONESI[^\n]*'
    replacement: ''

  # =========================================================
  # WHITESPACE NORMALIZE
  # =========================================================
  - name: normalize_whitespace
    type: whitespace_normalize

  # Hapus artefak karakter tunggal di awal dokumen (setelah normalize)
  - name: remove_leading_artifact
    type: noise_removal
    pattern: '^[a-z0-9][,\.]?\s'
    replacement: ''

  # =========================================================
  # STRUCTURE SPLIT — dijalankan SETELAH whitespace_normalize
  # =========================================================

  # Section PENJELASAN sebagai batas top-level (4 baris baru)
  - name: split_before_penjelasan
    type: structure_split
    pattern: 'PENJELASAN(?:\s+ATAS)?'
    newlines_before: 4

  # Frasa pembuka preamble
  # \s* (opsional) untuk handle "RAHMATTUHAN" (garbled merge dari beberapa sumber PDF)
  - name: split_before_dengan_rahmat
    type: structure_split
    pattern: 'DENGAN\s+RAHMAT\s*TUHAN\s+YANG\s+MAHA\s+ESA'
    newlines_before: 2

  # Kata kunci preamble diikuti tanda titik dua
  - name: split_before_structural_keywords
    type: structure_split
    pattern: '(?:Menimbang|Mengingat|MEMUTUSKAN|Menetapkan)\s*:'
    newlines_before: 2
    flags: [IGNORECASE]

  # Bagian persetujuan bersama DPR — khas UU (Pasal 20 UUD 1945)
  - name: split_before_dengan_persetujuan
    type: structure_split
    pattern: 'Dengan\s+Persetujuan\s+Bersama'
    newlines_before: 2

  # BAB (level 1), termasuk suffix huruf sisipan: BAB IXA
  - name: split_before_bab
    type: structure_split
    pattern: 'BAB\s+[IVXLCDM]+[A-Z]?'
    newlines_before: 2

  # Marker section Batang Tubuh
  - name: split_before_ketentuan_section
    type: structure_split
    pattern: 'KETENTUAN\s+(?:UMUM|PIDANA|PERALIHAN|PENUTUP)'
    newlines_before: 2

  # Pasal (unit utama) — UU menggunakan angka Romawi (Pasal I, II) ATAU Arab (Pasal 1, 2)
  # [IVX][IVXLCDM]* cover Roman numerals; \d+[A-Z]? cover Arab termasuk suffix (28D)
  - name: split_before_pasal
    type: structure_split
    pattern: 'Pasal\s+(?:[IVX][IVXLCDM]*|\d+[A-Z]?)'
    newlines_before: 2

  # Ayat: (1), (2), (1a) — sub-Pasal
  # [1l\d]+ termasuk OCR error l→1 dari sumber scan
  - name: split_before_ayat
    type: structure_split
    pattern: '\([1l\d]+[a-z]?\)'
    newlines_before: 1
    space_after: true

  # Poin angka: 1., 2., dst.
  - name: split_before_numbered_points
    type: structure_split
    pattern: '\d+\.'
    newlines_before: 1
    space_after: true

  # Poin huruf: a., b., dst. (hanya jika diikuti kata kunci hukum — hindari false positive)
  - name: split_before_letter_points
    type: structure_split
    pattern: '[a-z]\.'
    newlines_before: 1
    requires_following: 'bahwa|dalam|berdasarkan|pada|meliputi|untuk|dengan|terhadap|setiap|apabila|kepada|bahwa|perkara|ketentuan|pidana|daerah|hukum'

markdown_headings:
  - pattern: 'PENJELASAN(?:\s+ATAS)?'
    level: 2
  - pattern: 'BAB\s+[IVXLCDM]+[A-Z]?'
    level: 2
  - pattern: 'Pasal\s+(?:[IVX][IVXLCDM]*|\d+[A-Z]?)'
    level: 3

validation:
  title_keywords:
    - "UNDANG-UNDANG REPUBLIK INDONESIA"
    - "UNDANG-UNDANG"
  content_marker_pattern: 'Pasal\s+(?:[IVX][IVXLCDM]*|\d+)'
  content_marker_label: "Pasal"
  noise_check_patterns:
    - 'SK\s+No'
    - 'Menemukan kesalahan ketik'
    - '\s*-\s*\d+\s*-\s*'
